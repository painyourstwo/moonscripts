<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>404 - MoonScripts</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#7b2cff,#0066ff);
font-family:Arial,sans-serif;
color:white;
padding:20px;
text-align:center;
}

.container{
max-width:800px;
}

h1{
font-family:'Cinzel',serif;
font-size:clamp(5rem,15vw,10rem);
margin-bottom:10px;
text-shadow:0 0 20px rgba(255,255,255,.3);
}

h2{
font-size:clamp(1.5rem,4vw,2.5rem);
margin-bottom:20px;
}

p{
font-size:clamp(1rem,2vw,1.2rem);
margin-bottom:30px;
line-height:1.6;
opacity:.9;
}

.btn{
display:inline-block;
padding:14px 28px;
border-radius:12px;
text-decoration:none;
color:white;
background:rgba(255,255,255,.15);
border:1px solid rgba(255,255,255,.2);
font-weight:bold;
transition:.25s;
}

.btn:hover{
transform:translateY(-3px);
background:rgba(255,255,255,.25);
}
</style>
</head>
<body>

<div class="container">

<h1>404</h1>

<h2>Looks like this page drifted to the dark side of the moon.</h2>

<p>
The page you're looking for doesn't exist, was moved,
or was never created.
</p>

<a href="/" class="btn">Return Home</a>

</div>

</body>
</html>
