<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MoonScripts</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
background:linear-gradient(135deg,#7b2cff,#0066ff);
font-family:Arial,sans-serif;
color:white;
padding:20px;
}

.container{
max-width:900px;
width:100%;
}

h1{
font-family:'Cinzel',serif;
font-size:clamp(2rem,8vw,5.5rem);
margin-bottom:20px;
}

p{
font-size:clamp(1rem,2vw,1.3rem);
margin-bottom:30px;
line-height:1.6;
}

.buttons{
display:flex;
justify-content:center;
gap:15px;
flex-wrap:wrap;
}

.btn{
text-decoration:none;
color:white;
padding:14px 28px;
border-radius:12px;
background:rgba(255,255,255,.15);
border:1px solid rgba(255,255,255,.2);
font-weight:bold;
}

@media(max-width:768px){
.buttons{
flex-direction:column;
align-items:center;
}
.btn{
width:100%;
max-width:300px;
}
}
</style>
</head>
<body>

<div class="container">
<h1>WELCOME TO MOONSCRIPTS</h1>

<p>
A growing scripting community looking for developers and creators.
</p>

<div class="buttons">
<a class="btn" href="https://discord.gg/wwfZMCVzsH">Join Discord</a>
<a class="btn" href="/information">About Us</a>
</div>
</div>

</body>
</html>
